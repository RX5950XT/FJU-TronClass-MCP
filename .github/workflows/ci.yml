name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Format check (ruff)
        run: uv run ruff format --check src/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest tests/unit tests/integration -q --cov=src/fju_tronclass/client --cov=src/fju_tronclass/services --cov-fail-under=90 --cov-report=term-missing
